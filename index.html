<!DOCTYPE html>
<html>
<head>
  <title>NOC Dashboard</title>
  <style>
    body { font-family: Arial; background:#020617; color:white; margin:0; }
    header { padding:20px; background:#0f172a; }
    .banner { margin:20px; padding:15px; border-radius:10px; }
    .healthy { background:#064e3b; }
    .critical { background:#7f1d1d; }
    table { width:95%; margin:20px; border-collapse:collapse; }
    th, td { padding:12px; border-bottom:1px solid #1f2937; }
    th { background:#1e293b; }
    .ok { color:#22c55e; }
    .warn { color:#facc15; }
    .bad { color:#ef4444; }
  </style>
</head>

<body>

<header>
  <h2>🖥️ NOC Dashboard</h2>
</header>

<div id="globalBanner" class="banner healthy">
  Loading status...
</div>

<!-- ✅ BUTTON (correct place) -->
<button onclick="toggleFilter()" style="margin-left:20px;padding:10px;background:#2563eb;color:white;border:none;border-radius:8px;">
  Toggle: Show Only Issues
</button>

<table>
<thead>
<tr>
<th>Product</th>
<th>Status</th>
<th>Details</th>
<th>Link</th>
</tr>
</thead>

<tbody id="statusTable"></tbody>
</table>

<script>
const products = [
  { name:"NinjaOne", url:"https://status.ninjaone.com", api:"https://status.ninjaone.com/api/v2/summary.json" },
  { name:"Kaseya", url:"https://status.kaseya.com", api:"https://status.kaseya.com/api/v2/summary.json" },
  { name:"ConnectWise", url:"https://status.connectwise.com", api:"https://status.connectwise.com/api/v2/summary.json" },
  { name:"Microsoft 365", url:"https://status.cloud.microsoft", api:null }
];

let showOnlyIssues = false;

function toggleFilter() {
  showOnlyIssues = !showOnlyIssues;
  loadStatus();
}

function getStatus(ind) {
  if(ind==="none") return ["🟢","ok"];
  if(ind==="minor") return ["🟡","warn"];
  return ["🔴","bad"];
}

async function loadStatus() {
  let table = document.getElementById("statusTable");
  table.innerHTML = "";
  let issues = 0;

  for (let p of products) {
    let status="Manual", details="Check page", css="";

    if(p.api){
      try{
        let r=await fetch(p.api);
        let d=await r.json();
        let ind=d.status.indicator;
        let s=getStatus(ind);
        status=s[0]+" "+d.status.description;
        css=s[1];

        if(ind!=="none") issues++;

        details=d.incidents.length?d.incidents[0].name:"No incidents";
      }catch{}
    }

    if(showOnlyIssues && css==="ok") continue;

    table.innerHTML += `
    <tr>
      <td>${p.name}</td>
      <td class="${css}">${status}</td>
      <td>${details}</td>
      <td><a href="${p.url}" target="_blank">Open</a></td>
    </tr>`;
  }

  let banner=document.getElementById("globalBanner");

  if(issues>0){
    banner.className="banner critical";
    banner.innerText="🔴 Issues Detected";
  }else{
    banner.className="banner healthy";
    banner.innerText="🟢 All Systems Operational";
  }
}

loadStatus();
setInterval(loadStatus,300000);
</script>

</body>
</html>
